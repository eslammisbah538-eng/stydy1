<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyVerse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" as="script">
  <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <div class="bg-pattern"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <header class="site-header">
    <div class="container">
      <div class="logo">
        <div class="logo-icon"><span>S</span></div>
        <div>
          <div class="logo-text">StudyVerse</div>
          <div class="logo-sub">منصة مذاكرتك</div>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-badge">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon
              points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
          </svg>
          طريقك للتفوق الدراسي يبدأ من هنا
        </div>
        <h1 class="hero-title">اختار المادة<br><span class="accent">وابدأ ذاكر</span></h1>
        <p class="hero-sub">شرح + ترجمة + أسئلة — كل حاجة منظمة وجاهزة ليك</p>
      </div>
    </section>

    <section class="subjects-section">
      <div class="container">
        <div class="subjects-grid" id="subjectsGrid">

          <!-- المادة الأولى -->
          <a href="lectures/subject-1/index.html" class="subject-card" style="--card-color:#00C48C;--card-bg:#E0FBF4">
            <div class="card-icon-wrap">
              <!-- Microscope icon for science -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 18h8" />
                <path d="M3 22h18" />
                <path d="M14 22a7 7 0 1 0 0-14h-1" />
                <path d="M9 14h2" />
                <path d="M9 12a2 2 0 0 1-2-2V6h6v4a2 2 0 0 1-2 2Z" />
                <path d="M12 6V3a1 1 0 0 0-1-1H9a1 1 0 0 0-1 1v3" />
              </svg>
            </div>
            <div class="card-body">
              <h2 class="card-name">A Brief History of Science</h2>
              <p class="card-meta">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
                د. مصطفى رضوان
              </p>
              <div class="card-stats">
                <span class="stat">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" />
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" />
                  </svg>
                  محاضرات
                </span>
                <span class="stat">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                    <path d="M12 17h.01" />
                  </svg>
                  100سؤال
                </span>
                <span class="stat">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                    <polyline points="14 2 14 8 20 8" />
                  </svg>
                  مذكرات
                </span>
              </div>
            </div>
            <div class="card-arrow">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="m15 18-6-6 6-6" />
              </svg>
            </div>
          </a>

          <!-- PLACEHOLDER: مادة جديدة
        <a href="lectures/subject-2/index.html" class="subject-card" style="--card-color:#6366F1;--card-bg:#EEF2FF">
          <div class="card-icon-wrap">
            SVG icon here
          </div>
          <div class="card-body">
            <h2 class="card-name">اسم المادة</h2>
            <p class="card-meta">اسم الدكتور</p>
            <div class="card-stats">
              <span class="stat">X محاضرات</span>
            </div>
          </div>
          <div class="card-arrow">...</div>
        </a>
        -->

        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>StudyVerse &mdash; منصة مذاكرتك</p>
    </div>
    <div>
      <p>تطوير وتصميم بواسطه <B>Islam Misbah</B></p>
    </div>

  </footer>

  <script src="js/main.js"></script>
</body>

</html>
